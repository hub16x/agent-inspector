<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspector de Complementos</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: monospace;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
        }
        .label {
            font-size: 1.2rem;
            color: #9ca3af;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .value {
            font-size: 4rem;
            font-weight: bold;
            color: #ec4899; /* Color rosa/fucsia */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="label">Plugins detectados en el Navegador</div>
        <div class="value" id="plugins-count">0</div>
    </div>

    <script>
        // Cuenta cuántos plugins/complementos internos tiene el navegador
        const cantidadPlugins = navigator.plugins.length;
        
        document.getElementById('plugins-count').textContent = cantidadPlugins;
    </script>

</body>
</html>
