<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OvO Benchmark - Prueba de Estrés</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: monospace;
        }

        /* El juego OvO ocupando todo el visor */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* El monitor de rendimiento superior */
        .fps-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 9999;
            background-color: rgba(5, 5, 10, 0.95);
            border: 2px solid #a855f7; /* Morado para pruebas extremas */
            border-radius: 8px;
            padding: 15px 25px;
            text-align: center;
            box-shadow: 0 4px 25px rgba(0,0,0,0.9);
            pointer-events: none;
        }
        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #9ca3af;
            margin-bottom: 5px;
        }
        .value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #a855f7;
        }
        .bot-tag {
            font-size: 0.7rem;
            color: #4b5563;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- Inyectamos una versión unblocked y directa del motor de OvO -->
    <iframe src="https://hub16x.github.io/OvO"></iframe>

    <!-- Pantalla de control de fotogramas por encima -->
    <div class="fps-overlay">
        <div class="label">Rendimiento Físico 2D</div>
        <div class="value" id="fps-counter">00 FPS</div>
        <div class="bot-tag">ESTRÉS EXTREMO SIN GPU</div>
    </div>

    <script>
        let lastTime = performance.now();
        let frameCount = 0;
        const fpsDisplay = document.getElementById('fps-counter');

        function calculateFPS() {
            frameCount++;
            const now = performance.now();
            
            if (now >= lastTime + 1000) {
                const fps = Math.round((frameCount * 1000) / (now - lastTime));
                fpsDisplay.textContent = `${fps} FPS`;
                
                frameCount = 0;
                lastTime = now;
            }
            requestAnimationFrame(calculateFPS);
        }
        
        requestAnimationFrame(calculateFPS);
    </script>

</body>
</html>
