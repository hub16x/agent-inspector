<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lienzo Fantasma</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            height: 100vh;
            background-color: #030303;
            overflow: hidden;
            position: relative;
            font-family: monospace;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .ui-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            background-color: rgba(5, 5, 10, 0.85);
            border: 2px solid #27272a;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 90%;
        }
        .label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #a1a1aa;
            margin-bottom: 8px;
        }
        .value {
            font-size: 2.2rem;
            font-weight: bold;
            color: #a855f7; /* Morado */
            margin-bottom: 20px;
        }
        .signature {
            font-size: 1.1rem;
            color: #10b981; /* Verde */
        }
    </style>
</head>
<body>

    <!-- El lienzo donde el bot va a dibujar a la fuerza -->
    <canvas id="canvas-arte"></canvas>

    <!-- La tarjeta con los datos congelados -->
    <div class="ui-overlay">
        <div class="label">Marca de Tiempo del Servidor</div>
        <div class="value" id="timestamp-display">0000000000000</div>
        
        <div class="label">Firma del Autor</div>
        <div class="signature">DISEÑADO POR SOFTWARE POR VERCEL_BOT</div>
    </div>

    <script>
        // 1. Mostrar la marca de tiempo exacta en milisegundos de UNIX
        document.getElementById('timestamp-display').textContent = Date.now();

        // 2. Configurar el lienzo de dibujo
        const canvas = document.getElementById('canvas-arte');
        const ctx = canvas.getContext('2d');

        // Ajustamos el tamaño del lienzo al tamaño de la pantalla del bot
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 3. Generar el arte geométrico aleatorio
        // Usamos un bucle para dibujar 150 líneas fluorescentes al azar
        const colores = ['#f43f5e', '#3b82f6', '#10b981', '#a855f7', '#eab308', '#06b6d4'];
        
        for (let i = 0; i < 150; i++) {
            ctx.beginPath();
            // Puntos de inicio aleatorios
            ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
            // Puntos de fin aleatorios
            ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
            
            // Grosor y color aleatorio
            ctx.lineWidth = Math.random() * 3 + 0.5;
            ctx.strokeStyle = colores[Math.floor(Math.random() * colores.length)];
            // Le damos un toque de transparencia para que se mezclen genial
            ctx.globalAlpha = 0.4; 
            ctx.stroke();
        }
    </script>

</body>
</html>
