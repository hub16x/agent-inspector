<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Caos Temporal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #030303;
            color: #f3f4f6;
            font-family: monospace;
            padding: 24px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background-color: #09090e;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .full-width {
            grid-column: span 2;
        }
        .label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #71717a;
            margin-bottom: 12px;
        }
        .value {
            font-weight: bold;
        }
        #fps-display {
            font-size: 3.5rem;
            color: #a855f7; /* Morado */
        }
        #history-display {
            font-size: 3.5rem;
            color: #eab308; /* Amarillo */
        }
        .timeline {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 10px;
        }
        .milestone {
            padding: 8px 12px;
            background-color: #18181b;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #ef4444; /* Rojo por defecto (Inactivo) */
        }
        .milestone.active {
            color: #22c55e; /* Verde (Logrado) */
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. El Detector de Mentiras Temporal -->
        <div class="card full-width">
            <div class="label">Línea del Tiempo (Hitos del Reloj)</div>
            <div class="timeline">
                <div id="t-10" class="milestone">10ms</div>
                <div id="t-100" class="milestone">100ms</div>
                <div id="t-500" class="milestone">500ms</div>
                <div id="t-1000" class="milestone">1000ms</div>
                <div id="t-2000" class="milestone">2000ms</div>
            </div>
        </div>

        <!-- 2. Fluidez Gráfica (FPS acumulados) -->
        <div class="card">
            <div class="label">Fotogramas Renderizados (FPS totales)</div>
            <div class="value" id="fps-display">0</div>
        </div>

        <!-- 3. Páginas en el Historial -->
        <div class="card">
            <div class="label">Páginas en Historial Interno</div>
            <div class="value" id="history-display">0</div>
        </div>
    </div>

    <script>
        // --- 1. SEGUIMIENTO DE HITOS TEMPORALES ---
        const activarHito = (id) => {
            document.getElementById(id).classList.add('active');
        };

        setTimeout(() => activarHito('t-10'), 10);
        setTimeout(() => activarHito('t-100'), 100);
        setTimeout(() => activarHito('t-500'), 500);
        setTimeout(() => activarHito('t-1000'), 1000);
        setTimeout(() => activarHito('t-2000'), 2000);


        // --- 2. CONTADOR DE FOTOGRAMAS (FPS) ---
        let totalFrames = 0;
        function countFrames() {
            totalFrames++;
            document.getElementById('fps-display').textContent = totalFrames;
            requestAnimationFrame(countFrames);
        }
        requestAnimationFrame(countFrames);


        // --- 3. LONGITUD DEL HISTORIAL ---
        document.getElementById('history-display').textContent = window.history.length;
    </script>

</body>
</html>
