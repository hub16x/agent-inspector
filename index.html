<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Límite del Frontend</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #020205;
            color: #f3f4f6;
            font-family: monospace;
            padding: 24px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background-color: #0b0c16;
            border: 1px solid #1e2038;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .full-width {
            grid-column: span 2;
        }
        .label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #6b7280;
            margin-bottom: 12px;
        }
        .value {
            font-weight: bold;
        }
        #bot-status {
            font-size: 3.5rem;
        }
        #color-display {
            font-size: 3.5rem;
            color: #38bdf8; /* Azul claro */
        }
        #fonts-display {
            font-size: 3.5rem;
            color: #f43f5e; /* Rosa */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. El chivato de robots (WebDriver) -->
        <div class="card full-width">
            <div class="label">¿Es un Bot Automatizado? (navigator.webdriver)</div>
            <div class="value" id="bot-status">Detectando...</div>
        </div>

        <!-- 2. Profundidad de Color de la pantalla -->
        <div class="card">
            <div class="label">Bits de Color de Pantalla</div>
            <div class="value" id="color-display">0 bits</div>
        </div>

        <!-- 3. Fuentes cargadas en el sistema -->
        <div class="card">
            <div class="label">Fuentes del Sistema Cargadas</div>
            <div class="value" id="fonts-display">0</div>
        </div>
    </div>

    <script>
        // 1. Detectar si el navegador admite abiertamente que es un robot
        const esRobot = navigator.webdriver;
        const statusElement = document.getElementById('bot-status');
        if (esRobot) {
            statusElement.textContent = "SÍ (TRUE) 🤖";
            statusElement.style.color = "#ef4444"; // Rojo peligro
        } else {
            statusElement.textContent = "NO (FALSE) 👤";
            statusElement.style.color = "#22c55e"; // Verde humano
        }

        // 2. Medir los bits de profundidad de color
        document.getElementById('color-display').textContent = `${screen.colorDepth} bits`;

        // 3. Contar cuántas familias de fuentes tiene cargadas el navegador
        // Nota: Esto cuenta los conjuntos cargados en el documento actual listos para usar
        document.getElementById('fonts-display').textContent = document.fonts.size;
    </script>

</body>
</html>
