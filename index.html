<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Modo Visual</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: monospace;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
        }
        .label {
            font-size: 1.2rem;
            color: #9ca3af;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .value {
            font-size: 4rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="label">Preferencia de Tema del Sistema</div>
        <div class="value" id="theme-display">Detectando...</div>
    </div>

    <script>
        const themeDisplay = document.getElementById('theme-display');

        // Comprobamos si el navegador prefiere modo oscuro
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            themeDisplay.textContent = "MODO OSCURO 🌙";
            themeDisplay.style.color = "#38bdf8"; // Azul claro
        } else {
            themeDisplay.textContent = "MODO CLARO ☀️";
            themeDisplay.style.color = "#fbbf24"; // Amarillo sol
        }
    </script>

</body>
</html>
