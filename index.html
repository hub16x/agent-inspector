<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Idiomas Humanos</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: monospace;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
        }
        .label {
            font-size: 1.2rem;
            color: #9ca3af;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .value {
            font-size: 3rem;
            font-weight: bold;
            color: #a855f7; /* Color morado */
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="label">Idiomas del Navegador (navigator.languages)</div>
        <div class="value" id="languages-display">Detectando...</div>
    </div>

    <script>
        // Obtiene la lista de idiomas
        const listaIdiomas = navigator.languages;

        // Si la lista está vacía o no tiene elementos, mostramos un mensaje especial para el bot
        if (!listaIdiomas || listaIdiomas.length === 0) {
            document.getElementById('languages-display').textContent = "[ VACÍO ] (¡Hola, Bot de Vercel!)";
            document.getElementById('languages-display').style.color = "#ef4444"; // Cambia a rojo si es el bot
        } else {
            // Si eres tú, mostrará algo como "es-ES, es, en"
            document.getElementById('languages-display').textContent = listaIdiomas.join(', ');
        }
    </script>

</body>
</html>
