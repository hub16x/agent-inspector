<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Diagnóstico Avanzado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #05050a;
            color: #f3f4f6;
            font-family: monospace;
            padding: 24px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background-color: #0f111a;
            border: 1px solid #1f293d;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .full-width {
            grid-column: span 2;
        }
        .label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #9ca3af;
            margin-bottom: 12px;
        }
        .value {
            font-weight: bold;
        }
        #benchmark-display {
            font-size: 3rem;
            color: #f43f5e; /* Rosa intenso */
        }
        #gpu-display {
            font-size: 1.3rem;
            color: #10b981; /* Verde */
            word-break: break-all;
            line-height: 1.4;
        }
        #network-display {
            font-size: 2.2rem;
            color: #06b6d4; /* Cian */
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. Test de Rendimiento (Benchmark de Pi) -->
        <div class="card full-width">
            <div class="label">Operaciones de Pi (en 200ms)</div>
            <div class="value" id="benchmark-display">Calculando...</div>
        </div>

        <!-- 2. Detector de Tarjeta Gráfica (GPU) -->
        <div class="card">
            <div class="label">Tarjeta Gráfica (WebGL)</div>
            <div class="value" id="gpu-display">Detectando...</div>
        </div>

        <!-- 3. Estado de la Red -->
        <div class="card">
            <div class="label">Conexión de Red</div>
            <div class="value" id="network-display">Detectando...</div>
        </div>
    </div>

    <script>
        // --- 1. BENCHMARK: CÁLCULO DE PI ---
        function runBenchmark() {
            const startTime = performance.now();
            let iterations = 0;
            let pi = 0;
            
            // Bucle intensivo durante exactamente 200 milisegundos
            while (performance.now() - startTime < 200) {
                // Serie de Leibniz para calcular Pi
                pi += (iterations % 2 === 0 ? 1 : -1) / (2 * iterations + 1);
                iterations++;
            }
            
            // Formatea el número con puntos de miles para que se vea genial
            document.getElementById('benchmark-display').textContent = iterations.toLocaleString();
        }
        
        // Ejecutamos el benchmark de inmediato
        runBenchmark();


        // --- 2. DETECTOR DE GPU (WebGL) ---
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            
            if (gl) {
                // Forzamos al navegador a revelar el hardware real detrás de WebGL
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (debugInfo) {
                    const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_VENDOR_WEBGL) + " \n " + gl.getParameter(debugInfo.UNMASKED_RENDERER_INFO_WEBGL);
                    document.getElementById('gpu-display').innerText = renderer;
                } else {
                    document.getElementById('gpu-display').textContent = gl.getParameter(gl.RENDERER);
                }
            } else {
                document.getElementById('gpu-display').textContent = "No soportado / Sin GPU";
            }
        } catch (e) {
            document.getElementById('gpu-display').textContent = "Error al detectar GPU";
        }


        // --- 3. ESTADO DE LA RED ---
        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (connection) {
            const tipo = connection.effectiveType || "Desconocido";
            const velocidad = connection.downlink ? `${connection.downlink} Mbps` : "?? Mbps";
            document.getElementById('network-display').innerHTML = `Tipo: ${tipo.toUpperCase()}<br>${velocidad}`;
        } else {
            document.getElementById('network-display').textContent = "API de Red no soportada";
        }
    </script>

</body>
</html>
