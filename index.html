<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Mad + FPS Benchmark</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: monospace;
        }

        /* El juego real corriendo de fondo */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* El contador de fotogramas inyectado por encima */
        .fps-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 9999; /* Asegura estar por encima del juego */
            background-color: rgba(5, 5, 10, 0.9);
            border: 2px solid #ef4444; /* Rojo alerta */
            border-radius: 8px;
            padding: 15px 25px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            pointer-events: none; /* No interfiere si haces clic */
        }
        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #9ca3af;
            margin-bottom: 5px;
        }
        .value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #f43f5e;
        }
        .bot-tag {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- Inyectamos una versión unblocked y limpia de Drive Mad mediante un mirror de GitHub -->
    <iframe src="https://hub16x.github.io/drive-mad"></iframe>

    <!-- Capa del contador inyectada sobre el juego -->
    <div class="fps-overlay">
        <div class="label">Rendimiento del Motor</div>
        <div class="value" id="fps-counter">00 FPS</div>
        <div class="bot-tag">AUDITORÍA DE ENTORNO VIRTUAL</div>
    </div>

    <script>
        let lastTime = performance.now();
        let frameCount = 0;
        const fpsDisplay = document.getElementById('fps-counter');

        function calculateFPS() {
            frameCount++;
            const now = performance.now();
            
            // Cada vez que pase 1 segundo, calculamos la tasa
            if (now >= lastTime + 1000) {
                const fps = Math.round((frameCount * 1000) / (now - lastTime));
                fpsDisplay.textContent = `${fps} FPS`;
                
                frameCount = 0;
                lastTime = now;
            }
            requestAnimationFrame(calculateFPS);
        }
        
        // Iniciamos la monitorización del bucle gráfico
        requestAnimationFrame(calculateFPS);
    </script>

</body>
</html>
