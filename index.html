<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonas Horarias Globales</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: monospace;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
        }
        .label {
            font-size: 1.2rem;
            color: #9ca3af;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .value {
            font-size: 3.5rem;
            font-weight: bold;
            color: #06b6d4; /* Color cian / azul brillante */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="label">Zona Horaria del Servidor</div>
        <div class="value" id="timezone-display">Detectando...</div>
    </div>

    <script>
        // Obtiene la zona horaria oficial del sistema (ej: "America/New_York", "Europe/Madrid")
        const zonaHoraria = Intl.DateTimeFormat().resolvedOptions().timeZone;
        
        document.getElementById('timezone-display').textContent = zonaHoraria;
    </script>

</body>
</html>
